# Enable RPC server mode so the wallet app can talk to the node.
server=1

# Use an isolated local chain intended for development and demos.
regtest=1

# Demo RPC credentials used by the Makefile and local RPC practice.
rpcuser=bitcoin
rpcpassword=bitcoin

# Keep a full transaction index to simplify demo queries.
txindex=1

# Allow wallet transactions without fee estimation warmup.
fallbackfee=0.0002

# Send logs to container stdout so `docker logs` works.
printtoconsole=1

[regtest]
# Regtest RPC and P2P ports inside the container.
rpcport=18443
port=18444

# Listen on all container interfaces so the published port reaches bitcoind.
# Connections are accepted only from localhost and the Docker bridge range.
rpcbind=0.0.0.0
rpcallowip=127.0.0.1
rpcallowip=172.16.0.0/12
